<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         /* html{
            font-size: 30px;              
            /* by default 16px font-size */
        
        .parent{
            font-size: 35px;
            /* 1em = 35px */
        }
        .box{
            background-color: aquamarine;
            margin:10px; 
        }
        .px{
            width:200px;
        }
        .vw{
            width:10vw;
        }
        .em{
            width:10em;                /* takes parnt element width */
        }
        .rem{
            width:10rem;               /* takes root element(HTML) width */
        }
        .ems li{
            font-size: 1.5em;
        }
        .rems li{
            font-size: 1.5rem;
            /* 1.5*16px=24px */
        }
    </style>
</head>
<body>
    <div class="main">
        <div class=" box px">i am 200px wide</div>
        <div class=" box vw">i am 10vw wide</div>
        <div class="parent">
        <div class=" box em">i am 10em wide</div>
        </div>
        <div class="box rem">I am 10rem wide</div>
    </div>

    <!-- difference b/w rem and em -->
     <ul class="rems">
        <li>One</li>
        <li>Two</li>
        <li>Three
            <ul>
                <li>Three a</li>
                <li>Three b
                    <ul>
                        <li>Three b a</li>
                    </ul>
                </li>
            </ul>
        </li>
     </ul>

     <ul class="ems">
        <!-- 1.5*16 = 24px -->
        <li>One</li>
        <li>Two</li>
        <li>Three
            <!-- 1.5*16=24px * 1.5 = 36px -->
            <ul>
                <li>Three a</li>
                <li>Three b
                    <!-- 1.5*16=24px * 1.5=36px * 1.5 = 54px -->
                    <ul>
                        <li>Three b a</li>
                    </ul>
                </li>
            </ul>
        </li>
     </ul>
</body>
</html>
