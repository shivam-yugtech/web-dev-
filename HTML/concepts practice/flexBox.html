<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexBox</title>
    <style>
        .main>div{
            width: 200px;
            background-color: rgb(231, 231, 10);
            margin:20px;
            padding:10px
        }
        .main{
            display:flex;
            flex-direction:row;
                /* default option row */
            flex-wrap: wrap;
                /* default is no wrap */
            justify-content:center;
        }

    </style>
</head>
<body>
    <div class="main">
        <div>one</div>
        <div>two</div>
        <div>three</div>
        <div>four</div>
        <div>five</div>
        <div>six</div>
        <div>seven</div>
        <div>eight</div>
        <div>nine</div>
        <div>ten</div>
        <div>eleven</div>
        <div>twelve</div>
    </div>
</body>
</html>
