<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links and img</title>
</head>
<body>
    <!-- TO add links you can use anchor tag (a)
        TO open links in a new tab you can use a attribute (target="_blank")
        we can also add internal links to it not only external links -->
    <a href="https://google.com"target="_blank">  Go to google</a><br>
    <a href="https://facebook.com"target="_blank">  Go to facebook</a><br>
    <a href="https://linkedin.com"target="_blank">  Go to linkedin</a><br>
    <a href="https://twitter.com"target="_blank">  Go to twitter</a><br>
    <a href="https://youtube.com"target="_blank"> Go to youtube</a><br>
    <a href="/notes.txt"target="_blank"> Go to notes </a><br>

    <!-- TO add image to your web you can add by (img)tag and in (src) attribute you can add link of an image and in attribute (alt)you can give a message which image is this because if image doesn't loaded message will shown to user  -->

    <!-- For random images you can also search in source.unplash.com -->
    
    <img src="/istockphoto-1301535977-1024x1024.jpg" alt="image of an girl">
</body>
</html>
